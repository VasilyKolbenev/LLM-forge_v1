<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer ring -->
  <circle cx="20" cy="20" r="18" stroke="#a99bff" stroke-width="2.5" opacity="0.5"/>
  <!-- Inner ring -->
  <circle cx="20" cy="20" r="12" stroke="#a99bff" stroke-width="2.5" opacity="0.8"/>
  <!-- Core -->
  <circle cx="20" cy="20" r="6.5" fill="#6d5dfc"/>
  <circle cx="20" cy="20" r="4" fill="#a99bff"/>
  <!-- Cardinal rays -->
  <line x1="20" y1="0" x2="20" y2="7" stroke="#a99bff" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="33" x2="20" y2="40" stroke="#a99bff" stroke-width="3" stroke-linecap="round"/>
  <line x1="0" y1="20" x2="7" y2="20" stroke="#a99bff" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="20" x2="40" y2="20" stroke="#a99bff" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal rays -->
  <line x1="5.9" y1="5.9" x2="10.1" y2="10.1" stroke="#a99bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="29.9" y1="29.9" x2="34.1" y2="34.1" stroke="#a99bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34.1" y1="5.9" x2="29.9" y2="10.1" stroke="#a99bff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="5.9" y1="34.1" x2="10.1" y2="29.9" stroke="#a99bff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
