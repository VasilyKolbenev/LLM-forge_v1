# Service: internal ClusterIP service exposing the Pulsar AI API.
# The Ingress routes external traffic to this service.
apiVersion: v1
kind: Service
metadata:
  name: pulsar-ai
  namespace: pulsar-ai
  labels:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8888
      targetPort: http
      protocol: TCP
