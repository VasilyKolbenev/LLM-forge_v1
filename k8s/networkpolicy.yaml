# NetworkPolicy: restricts traffic to/from the Pulsar AI pods.
#
# Ingress: only allow traffic from the ingress controller namespace.
# Egress: only allow connections to PostgreSQL, Redis, DNS, and HTTPS (S3/APIs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pulsar-ai
  namespace: pulsar-ai
  labels:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pulsar-ai
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller (adjust namespace if different).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8888
  egress:
    # DNS resolution (kube-dns / CoreDNS).
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL within the namespace.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pulsar-ai
              app.kubernetes.io/component: postgresql
      ports:
        - protocol: TCP
          port: 5432
    # Redis within the namespace.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pulsar-ai
              app.kubernetes.io/component: redis
      ports:
        - protocol: TCP
          port: 6379
    # HTTPS egress for S3, external APIs (OpenAI, etc.).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              # Block access to cluster-internal metadata endpoints.
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 443
