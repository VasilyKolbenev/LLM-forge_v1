# Redis Deployment for Pulsar AI job queue.
# Uses redis:7-alpine with AOF persistence to match docker-compose.yml.
# For production, consider Redis Sentinel or a managed service.
apiVersion: v1
kind: Service
metadata:
  name: pulsar-ai-redis
  namespace: pulsar-ai
  labels:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulsar-ai-redis
  namespace: pulsar-ai
  labels:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pulsar-ai
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pulsar-ai
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          # AOF persistence + memory limits matching docker-compose.yml.
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Liveness: is Redis responding to PING?
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness: same check, more frequent.
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: pulsar-ai-redis-data
---
# PersistentVolumeClaim for Redis AOF persistence.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pulsar-ai-redis-data
  namespace: pulsar-ai
  labels:
    app.kubernetes.io/name: pulsar-ai
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
